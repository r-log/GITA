# Model Assignments for GITA
# Generated by Phase 0 bake-off on 2026-04-10
# Tested 6 models across 3 short-chain + 1 long-chain (15 calls) scenarios
# See tests/bakeoff/results/ for raw data
#
# How to read: each agent/workload has a primary model and optional fallback.
# The ModelRegistry in src/core/model_registry.py reads this file on startup.
# To change an agent's model, edit here and restart — no code changes needed.

agents:
  issue_analyst:
    primary: moonshotai/kimi-k2.5
    fallback: deepseek/deepseek-chat
    rationale: >
      100% tool validity on both short and long chains.
      Best token efficiency (30K vs 40-45K input tokens at 15 calls).
      $0.014/run. Cheapest viable option for high-volume routine work.

  pr_reviewer:
    primary: anthropic/claude-haiku-4.5
    fallback: moonshotai/kimi-k2.5
    rationale: >
      User-facing PR review comments need quality writing.
      Haiku: 100% valid, rich output, $0.033/run — 5x cheaper than Sonnet
      with equivalent reliability. Falls back to Kimi if Haiku is slow/down.

  risk_detective:
    primary: moonshotai/kimi-k2.5
    fallback: deepseek/deepseek-chat
    rationale: >
      Risk scanning is routine and high-volume (Phase 2 sweepers).
      100% valid, cheap. DeepSeek as fallback (also 100% valid, even cheaper).

  progress_tracker:
    primary: moonshotai/kimi-k2.5
    fallback: deepseek/deepseek-chat
    rationale: >
      High-volume in Phase 2 proactive loop. Milestone drift checks,
      stale PR nudges, velocity tracking — all routine. Kimi handles it.

  onboarding:
    primary: anthropic/claude-haiku-4.5
    fallback: anthropic/claude-sonnet-4
    rationale: >
      Goal decomposition and milestone inference need richer reasoning.
      Haiku matches Sonnet quality at 5x less cost. Sonnet fallback for
      edge cases where Haiku output is insufficient.

  test_author:
    primary: anthropic/claude-haiku-4.5
    fallback: anthropic/claude-sonnet-4
    rationale: >
      Phase 7: generating test code needs precision. Haiku writes
      structured code well. Sonnet fallback for complex test scenarios.

preprocessing:
  classification:
    primary: meta-llama/llama-3.3-70b-instruct
    rationale: >
      Fastest model by 3x (23.5s for 15 calls). Very terse output which
      is perfect for yes/no classification. Cheapest option.

  summarization:
    primary: deepseek/deepseek-chat
    fallback: moonshotai/kimi-k2.5
    rationale: >
      Good at condensing long content. 100% reliable, essentially free.

embeddings:
  primary: local/nomic-embed-text
  dimensions: 768
  backend: ollama
  rationale: >
    Unconditional local. Free, fast, no quality gap for retrieval.
    See PHASE_4_FINDING_BY_MEANING.md.

# Cost estimate at ~100 agent runs/day (1 active repo):
#   Kimi routine (60 runs × $0.014):     $0.84/day
#   Haiku judgment (30 runs × $0.033):    $0.99/day
#   DeepSeek fallback (5 runs × $0.003):  $0.015/day
#   Llama classification (5 runs × $0):   $0.00/day
#   Total: ~$1.85/day = ~$55/month
#
# Revisit self-hosting when: 10+ repos, >$500/month, or regulatory requirement.
